name: Deploy Sites

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-sites
  cancel-in-progress: true

jobs:
  deploy-release-screenshots:
    name: Deploy Release Screenshots
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Resolve screenshot metadata
        run: |
          echo "APP_VERSION=$(git describe --tags --abbrev=0 2>/dev/null || printf 1.0.0)" >> "$GITHUB_ENV"
          echo "COMMIT_HASH=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"
      - name: Build release screenshots
        env:
          PW_BROWSER_CHANNEL: chrome
        run: pnpm --filter @DarkAuth/test-suite test:screenshots
      - name: Deploy release screenshots
        env:
          RELEASE_DEPLOY_STORAGE_ZONE: ${{ vars.RELEASE_DEPLOY_STORAGE_ZONE }}
          RELEASE_DEPLOY_ACCESS_KEY: ${{ secrets.RELEASE_DEPLOY_ACCESS_KEY }}
        run: node scripts/deploy-release-screenshots.mjs
  deploy-brochureware:
    name: Deploy Brochureware
    runs-on: ubuntu-latest
    needs: deploy-release-screenshots
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @DarkAuth/brochureware build
      - run: |
          cd packages/brochureware
          node deploy.js
        env:
          BROCHUREWARE_DEPLOY_STORAGE_ZONE: ${{ vars.BROCHUREWARE_DEPLOY_STORAGE_ZONE }}
          BROCHUREWARE_DEPLOY_ACCESS_KEY: ${{ secrets.BROCHUREWARE_DEPLOY_ACCESS_KEY }}
      - run: |
          cd packages/brochureware
          node clearCache.js ${{ vars.BROCHUREWARE_DOMAIN }}
        env:
          PURGE_BUNNY_SECRET: ${{ secrets.PURGE_BUNNY_SECRET }}
  deploy-docs:
    name: Deploy Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @DarkAuth/docs build
      - run: |
          cd packages/docs
          node deploy.js
        env:
          DOCS_DEPLOY_STORAGE_ZONE: ${{ vars.DOCS_DEPLOY_STORAGE_ZONE }}
          DOCS_DEPLOY_ACCESS_KEY: ${{ secrets.DOCS_DEPLOY_ACCESS_KEY }}
      - run: |
          cd packages/docs
          node clearCache.js ${{ vars.DOCS_DOMAIN }}
        env:
          DOCS_PURGE_BUNNY_SECRET: ${{ secrets.DOCS_PURGE_BUNNY_SECRET }}
