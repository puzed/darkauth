name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: DarkAuth
          POSTGRES_PASSWORD: DarkAuth_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U DarkAuth" --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: DarkAuth
      POSTGRES_PASSWORD: DarkAuth_password
      NODE_ENV: test
      CI: true
      PW_BROWSER_CHANNEL: chrome
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @DarkAuth/api --filter @darkauth/client --filter opaque-ts --filter @DarkAuth/user-ui test
